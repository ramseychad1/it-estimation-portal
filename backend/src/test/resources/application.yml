spring:
  datasource:
    url: jdbc:h2:mem:estimator_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;NON_KEYWORDS=KEY,VALUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

logging:
  level:
    org.springframework.security: WARN

app:
  base-url: http://test.local
  security:
    # Never fail-fast on the seed-password override in tests (WEB-01) —
    # tests run with the V2/V5 seed defaults and no override env vars.
    require-seed-password-override: false
