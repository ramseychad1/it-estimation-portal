spring:
  application:
    name: estimator-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB
  datasource:
    url: jdbc:postgresql://localhost:5432/estimator_dev
    username: estimator
    password: estimator
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  # Railway sets the PORT env var; Spring Boot natively reads SERVER_PORT.
  # Bridge them here so the same image runs locally (8080 default) and on
  # Railway (whatever PORT it injects) without an extra env-var alias.
  port: ${PORT:8080}
  error:
    include-message: always
  servlet:
    session:
      timeout: 8h
      cookie:
        # Set to true in production (Railway: COOKIE_SECURE=true env var).
        # Keep false locally so session cookies work over plain HTTP.
        secure: ${COOKIE_SECURE:false}
        same-site: lax

# Application-specific properties.
app:
  # Used to construct the {base-url}/invite/{token} URL surfaced in
  # InvitationResult responses. Override per environment via APP_BASE_URL
  # env var. The dev value points at the Vite dev server.
  base-url: http://localhost:5173

intake:
  # ID of the system catalog product used as the requirements-carrier (CONTEXT item)
  # for INTAKE requests. Admin must create this product and set the ID here (or via
  # INTAKE_SYSTEM_PRODUCT_ID env var in production). 0 = not configured.
  system-product-id: ${INTAKE_SYSTEM_PRODUCT_ID:0}

logging:
  level:
    org.springframework.security: INFO
