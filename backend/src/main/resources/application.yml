spring:
  application:
    name: estimator-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/estimator_dev
    username: estimator
    password: estimator
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

logging:
  level:
    org.springframework.security: INFO
