spring:
  application:
    name: estimator-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/estimator_dev
    username: estimator
    password: estimator
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

# Application-specific properties.
app:
  # Used to construct the {base-url}/invite/{token} URL surfaced in
  # InvitationResult responses. Override per environment via APP_BASE_URL
  # env var. The dev value points at the Vite dev server.
  base-url: http://localhost:5173

logging:
  level:
    org.springframework.security: INFO
