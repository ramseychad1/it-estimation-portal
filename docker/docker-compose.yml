services:
  postgres:
    image: postgres:16
    container_name: estimator-postgres
    environment:
      POSTGRES_DB: estimator_dev
      POSTGRES_USER: estimator
      POSTGRES_PASSWORD: estimator
    ports:
      - "5432:5432"
    volumes:
      - estimator_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U estimator -d estimator_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  estimator_pgdata:
    name: estimator_pgdata
